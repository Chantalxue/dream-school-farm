<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>梦幻校园农场 | Dream School Farm | 三年级英语课堂</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免触屏拖动时选中文字，提升体验 */
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(145deg, #c8e8b5 0%, #a2d47a 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', cursive, sans-serif;
            min-height: 100vh;
        }

        /* 主网格布局 */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 农场画布区域 (左上侧) */
        .farm-area {
            background: #5b8c3e;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 5px solid #f9e2a1;
            position: relative;
            min-height: 580px;
            display: flex;
            flex-direction: column;
        }

        .pasture {
            background: #7cb342;
            background-image: radial-gradient(circle at 25% 40%, #6aa832 2%, transparent 2.5%);
            background-size: 30px 30px;
            flex: 1;
            min-height: 520px;
            position: relative;
            overflow: hidden;
            border-top: 8px solid #c2a15b;
            border-bottom: 8px solid #8b5a2b;
        }

        /* 动物图标拖拽源栏 — 放大动物图片 */
        .drag-source {
            background: #f7e8c0;
            padding: 15px 20px;
            display: flex;
            justify-content: space-around;
            gap: 20px;
            border-bottom: 4px solid #e0b354;
            flex-wrap: wrap;
        }

        .drag-item {
            background: #fef2df;
            border-radius: 48px;
            padding: 12px;
            box-shadow: 0 8px 0 #c29b3a;
            cursor: grab;
            transition: 0.05s linear;
            touch-action: none;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            width: 120px;
        }
        .drag-item:active {
            cursor: grabbing;
        }
        .animal-icon {
            font-size: 88px;      /* 超大完整动物图 */
            width: auto;
            height: auto;
            display: block;
            pointer-events: none;
            line-height: 1;
        }
        /* 农场内部动物 — 更大更清晰 */
        .farm-object {
            position: absolute;
            cursor: move;
            touch-action: none;
            transition: transform 0.02s ease;
            width: 100px;
            height: 100px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .farm-object div {
            font-size: 90px;      /* 动物体型巨大，清晰可见 */
            line-height: 1;
            filter: drop-shadow(4px 6px 6px rgba(0,0,0,0.2));
            pointer-events: none;
        }
        /* 智能体卡片 */
        .ai-card {
            background: #fffef7;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 15px 20px rgba(0,0,0,0.2);
            border: 3px solid #ffd966;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ai-avatar {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #e6f4d7;
            border-radius: 100px;
            padding: 10px 20px;
        }
        .ai-avatar span {
            font-size: 3rem;
        }
        .ai-speech-bubble {
            background: #f5f5dc;
            border-radius: 32px;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #3e5a2a;
            min-height: 90px;
            word-break: break-word;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            background: #ffb347;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #a45d19;
            transition: 0.08s linear;
            touch-action: manipulation;
            min-width: 110px;
            min-height: 54px;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #a45d19;
        }
        .btn-primary {
            background: #4caf50;
            box-shadow: 0 5px 0 #2e6b2f;
        }
        .btn-warning {
            background: #f57c00;
        }
        .btn-danger {
            background: #e34d4d;
            box-shadow: 0 5px 0 #942828;
        }
        /* 底部互动管理区 */
        .interaction-panel {
            grid-column: 1 / -1;
            background: #fff7e8;
            border-radius: 56px;
            margin-top: 20px;
            padding: 20px 24px;
            box-shadow: 0 15px 20px rgba(0,0,0,0.15);
        }
        .save-area {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
            background: #f7e3af;
            border-radius: 48px;
            padding: 16px 24px;
            margin-bottom: 28px;
        }
        .save-area input {
            flex: 2;
            min-width: 160px;
            padding: 14px 20px;
            font-size: 1.2rem;
            border-radius: 48px;
            border: 2px solid #c29b3a;
            font-family: inherit;
            background: white;
        }
        .works-list {
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 20px;
            background: #fcf3da;
            border-radius: 40px;
            padding: 12px;
        }
        .work-item {
            background: white;
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .rank-badge {
            background: gold;
            border-radius: 40px;
            padding: 5px 12px;
            font-weight: bold;
        }
        .rating-table {
            background: #fbe5b9;
            border-radius: 36px;
            padding: 18px;
            margin-top: 20px;
            font-size: 1.2rem;
        }
        .rating-table table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2rem;
        }
        .rating-table td, .rating-table th {
            padding: 12px;
            border-bottom: 2px dashed #c29b3a;
            text-align: left;
        }
        .rating-table th:last-child {
            /* 去掉“自我检查”四个字：第二列表头留空 */
            content: "";
        }
        .pasture {
            position: relative;
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #eedbae;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b97f2e;
            border-radius: 20px;
        }
        @media (max-width: 850px) {
            .dashboard { grid-template-columns: 1fr; }
            .drag-item { width: 100px; }
            .animal-icon { font-size: 70px; }
            .farm-object { width: 80px; height: 80px; }
            .farm-object div { font-size: 70px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 左侧农场画布 + 拖拽源 (动物完整图片)-->
    <div class="farm-area">
        <div class="drag-source" id="dragSourceContainer">
            <!-- 牛 🐄  鸡 🐓(完整公鸡)  羊 🐑  马 🐎(完整马匹) 全部完整身体 -->
            <div class="drag-item" data-animal="cow" data-name="cow">
                <div class="animal-icon">🐄</div>
            </div>
            <div class="drag-item" data-animal="chicken" data-name="chicken">
                <div class="animal-icon">🐓</div>
            </div>
            <div class="drag-item" data-animal="sheep" data-name="sheep">
                <div class="animal-icon">🐑</div>
            </div>
            <div class="drag-item" data-animal="horse" data-name="horse">
                <div class="animal-icon">🐎</div>
            </div>
        </div>
        <div class="pasture" id="pastureArea">
            <!-- 动态生成的动物会出现在这里，可随意移动 -->
        </div>
    </div>

    <!-- 右上AI智能体 (移除羊图案) -->
    <div class="ai-card">
        <div class="ai-avatar">
            <span>🤖</span>
            <h2>Farm AI · 助教</h2>
        </div>
        <div class="ai-speech-bubble" id="aiSpeech">✨ 拖拽动物到农场吧！ ✨</div>
        <div class="button-group">
            <button class="btn btn-primary" id="introFarmBtn">🐄 Introduce my farm</button>
            <button class="btn" id="clearBtn">🧹 Clear</button>
            <button class="btn" id="repeatBtn">🔊 再读一遍</button>
        </div>
    </div>

    <!-- 底部互动与作品管理区 -->
    <div class="interaction-panel">
        <div class="save-area">
            <input type="text" id="studentNameInput" placeholder="你的名字 (例如: Lily)" maxlength="12">
            <button class="btn btn-primary" id="saveFarmBtn">💾 保存我的农场</button>
            <button class="btn" id="randomPickBtn">🎲 抽选一名同学</button>
        </div>
        <div style="font-weight: bold; margin: 10px 0 8px 12px;">🏆 点赞排行榜 (前3名) 🏆</div>
        <div id="rankBoard" class="works-list" style="max-height: 130px;"></div>
        <div style="font-weight: bold; margin: 12px 0 8px 12px;">📚 全班作品列表</div>
        <div id="worksListContainer" class="works-list"></div>
        <!-- 评价标准表格 (去掉了“自我检查”字样) -->
        <div class="rating-table">
            <table>
                <thead>
                <tr><th>⭐ 评价标准</th><th></th></tr>
                </thead>
                <tbody>
                    <tr><td>1️⃣ 我能绘制我理想中的校园农场</td><td></td></tr>
                    <tr><td>2️⃣ 我能正确、流利的介绍我的农场</td><td></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ======================== 配置区域 ========================
    const DEEPSEEK_API_KEY = "";   // 如果有API Key可填写，未填写自动降级为本地规则
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    
    // 动物列表映射: 使用完整身体emoji 🐓(公鸡) / 🐎(马) 等
    const ANIMALS = {
        cow: { name: "cow", plural: "cows", emoji: "🐄", singular: "cow" },
        chicken: { name: "chicken", plural: "chickens", emoji: "🐓", singular: "chicken" },
        sheep: { name: "sheep", plural: "sheep", emoji: "🐑", singular: "sheep" },
        horse: { name: "horse", plural: "horses", emoji: "🐎", singular: "horse" }
    };
    const ANIMAL_LIST = ["cow", "chicken", "sheep", "horse"];
    
    // 全局状态
    let animalCounts = { cow: 0, chicken: 0, sheep: 0, horse: 0 };
    let lastGeneratedSentence = "";   // 保存最后一句句子用于再读一遍
    let currentSpeechUtterance = null;
    
    // 存储学生作品 { id, name, counts, likes }
    let studentWorks = [];
    let nextId = 100;
    
    // =============== 辅助函数: 语音朗读 (Web Speech API, 语速0.85, 音调略高) ==========
    function speakText(text, rate = 0.85, pitch = 1.1) {
        if (!window.speechSynthesis) {
            console.warn("浏览器不支持语音");
            return;
        }
        if (currentSpeechUtterance) {
            window.speechSynthesis.cancel();
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = rate;
        utterance.pitch = pitch;
        utterance.volume = 1;
        window.speechSynthesis.speak(utterance);
        currentSpeechUtterance = utterance;
        return utterance;
    }
    
    // 给定动物类型英文名及当前数量，生成朗读句子 "I have X [animal]."
    function speakAnimalCount(animalKey, count) {
        const animalInfo = ANIMALS[animalKey];
        if (!animalInfo) return "";
        const countWord = numberToEnglish(count);
        const noun = count === 1 ? animalInfo.singular : animalInfo.plural;
        const sentence = `I have ${countWord} ${noun}.`;
        lastGeneratedSentence = sentence;
        speakText(sentence, 0.85, 1.1);
        document.getElementById("aiSpeech").innerHTML = `🤖: ${sentence}`;
        return sentence;
    }
    
    // 数字转英文单词 (支持到99)
    function numberToEnglish(n) {
        if (n === 0) return "zero";
        const ones = ["", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine"];
        const teens = ["ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen", "seventeen", "eighteen", "nineteen"];
        const tens = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];
        if (n < 10) return ones[n];
        if (n < 20) return teens[n - 10];
        if (n < 100) {
            let t = Math.floor(n / 10);
            let o = n % 10;
            return tens[t] + (o ? "-" + ones[o] : "");
        }
        return n.toString();
    }
    
    // 生成农场的文本描述 (用于展示和语音)
    function generateFarmIntroText() {
        const parts = [];
        for (let animal of ANIMAL_LIST) {
            let cnt = animalCounts[animal];
            if (cnt > 0) {
                const word = numberToEnglish(cnt);
                const noun = cnt === 1 ? ANIMALS[animal].singular : ANIMALS[animal].plural;
                parts.push(`${word} ${noun}`);
            }
        }
        if (parts.length === 0) return "Hello! Welcome to my farm. I have no animals yet. Please drag some!";
        let listStr = parts.join(", ");
        const lastCommaIndex = listStr.lastIndexOf(", ");
        if (lastCommaIndex !== -1) {
            listStr = listStr.substring(0, lastCommaIndex) + " and " + listStr.substring(lastCommaIndex + 2);
        }
        return `Hello! Welcome to my farm. I have ${listStr}.`;
    }
    
    // 更新农场内所有动物元素（根据数量重新绘制）, 随机位置(随意摆放) — 使用当前 animalCounts
    function rebuildFarmFromCounts() {
        const pasture = document.getElementById("pastureArea");
        const existing = pasture.querySelectorAll(".farm-object");
        existing.forEach(el => el.remove());
        for (let animal of ANIMAL_LIST) {
            const count = animalCounts[animal];
            for (let i = 0; i < count; i++) {
                createAnimalElementAtRandomPos(animal, pasture);
            }
        }
    }
    
    // 在随机位置创建动物(新版尺寸100px, 边界适配)
    function createAnimalElementAtRandomPos(animalType, parentContainer) {
        const rect = parentContainer.getBoundingClientRect();
        const maxX = Math.max(120, rect.width - 110);
        const maxY = Math.max(120, rect.height - 110);
        let left = Math.random() * maxX;
        let top = Math.random() * maxY;
        left = Math.min(maxX - 20, Math.max(10, left));
        top = Math.min(maxY - 20, Math.max(10, top));
        return createAnimalElement(animalType, left, top, parentContainer);
    }
    
    function createAnimalElement(animalType, left, top, parentContainer) {
        const animalInfo = ANIMALS[animalType];
        const div = document.createElement("div");
        div.className = "farm-object";
        div.setAttribute("data-animal", animalType);
        div.style.position = "absolute";
        div.style.left = left + "px";
        div.style.top = top + "px";
        div.innerHTML = `<div>${animalInfo.emoji}</div>`;
        makeMovable(div);
        parentContainer.appendChild(div);
        return div;
    }
    
    // 为每个动物添加移动功能 (随意摆放)
    function makeMovable(element) {
        let isDragging = false;
        let startMouseX, startMouseY;
        let startLeft, startTop;
        
        function onPointerStart(e) {
            e.preventDefault();
            e.stopPropagation();
            isDragging = true;
            const touches = e.touches ? e.touches[0] : e;
            startMouseX = touches.clientX;
            startMouseY = touches.clientY;
            const leftVal = parseInt(element.style.left);
            const topVal = parseInt(element.style.top);
            startLeft = isNaN(leftVal) ? 0 : leftVal;
            startTop = isNaN(topVal) ? 0 : topVal;
            element.style.zIndex = "100";
        }
        
        function onPointerMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const touches = e.touches ? e.touches[0] : e;
            const dx = touches.clientX - startMouseX;
            const dy = touches.clientY - startMouseY;
            let newLeft = startLeft + dx;
            let newTop = startTop + dy;
            const parentRect = element.parentElement.getBoundingClientRect();
            const maxLeft = parentRect.width - element.offsetWidth;
            const maxTop = parentRect.height - element.offsetHeight;
            newLeft = Math.min(maxLeft, Math.max(0, newLeft));
            newTop = Math.min(maxTop, Math.max(0, newTop));
            element.style.left = newLeft + "px";
            element.style.top = newTop + "px";
        }
        
        function onPointerEnd(e) {
            isDragging = false;
            element.style.zIndex = "";
        }
        element.addEventListener("mousedown", onPointerStart);
        element.addEventListener("touchstart", onPointerStart, {passive: false});
        window.addEventListener("mousemove", onPointerMove);
        window.addEventListener("touchmove", onPointerMove, {passive: false});
        window.addEventListener("mouseup", onPointerEnd);
        window.addEventListener("touchend", onPointerEnd);
    }
    
    // 增加某动物数量: 在放置点生成动物，语音，更新全局计数
    function addAnimalByType(animalType, dropX, dropY) {
        if (!animalType) return;
        const pasture = document.getElementById("pastureArea");
        const rectPasture = pasture.getBoundingClientRect();
        let relativeX = dropX - rectPasture.left;
        let relativeY = dropY - rectPasture.top;
        // 偏移新动物中心点
        let left = relativeX - 50;
        let top = relativeY - 50;
        left = Math.min(rectPasture.width - 100, Math.max(0, left));
        top = Math.min(rectPasture.height - 100, Math.max(0, top));
        createAnimalElement(animalType, left, top, pasture);
        animalCounts[animalType] += 1;
        // 朗读句子 I have X ...
        speakAnimalCount(animalType, animalCounts[animalType]);
    }
    
    // 重置全部农场 (清空所有动物，数量归零)
    function resetFarm() {
        animalCounts = { cow: 0, chicken: 0, sheep: 0, horse: 0 };
        const pasture = document.getElementById("pastureArea");
        const animals = pasture.querySelectorAll(".farm-object");
        animals.forEach(a => a.remove());
        document.getElementById("aiSpeech").innerHTML = "✨ 农场已清空，拖拽新动物吧 ✨";
        lastGeneratedSentence = "";
    }
    
    // 【已修复】加载某个学生的农场：直接将动物数量设为保存的值，再重建农场（不调用resetFarm避免清零）
    function loadWork(work) {
        // 先移除画布上所有现有动物
        const pasture = document.getElementById("pastureArea");
        const animals = pasture.querySelectorAll(".farm-object");
        animals.forEach(a => a.remove());
        // 更新全局动物数量为保存的值
        animalCounts = { ...work.counts };
        // 根据新的数量重建动物（随机位置，但保证数量正确）
        for (let animal of ANIMAL_LIST) {
            const count = animalCounts[animal];
            for (let i = 0; i < count; i++) {
                createAnimalElementAtRandomPos(animal, pasture);
            }
        }
        document.getElementById("aiSpeech").innerHTML = `📂 加载了 ${work.name} 的农场！`;
        lastGeneratedSentence = "";
    }
    
    // ====================== AI介绍农场 (DeepSeek API 降级) 只展示文字，不自动朗读 ======================
    async function introduceFarm() {
        const introText = generateFarmIntroText();
        const fullIntro = `🐣 ${introText}`;
        document.getElementById("aiSpeech").innerHTML = fullIntro;
        lastGeneratedSentence = introText;
        // 尝试调用DeepSeek API生成更有趣的介绍(可选)，但不影响朗读，只优化文字
        if (DEEPSEEK_API_KEY && DEEPSEEK_API_KEY.trim() !== "") {
            try {
                const prompt = `You are a cheerful farm assistant for kids. Create a very short English introduction (one sentence) for a farm with ${animalCounts.cow} cows, ${animalCounts.chicken} chickens, ${animalCounts.sheep} sheep, ${animalCounts.horse} horses. Keep positive and fun.`;
                const response = await fetch(DEEPSEEK_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${DEEPSEEK_API_KEY}` },
                    body: JSON.stringify({ model: "deepseek-chat", messages: [{ role: "user", content: prompt }], max_tokens: 70 })
                });
                if (response.ok) {
                    const data = await response.json();
                    const aiSentence = data.choices[0].message.content.trim();
                    if (aiSentence) {
                        document.getElementById("aiSpeech").innerHTML = `🤖: ${aiSentence}`;
                        lastGeneratedSentence = aiSentence;
                        return;
                    }
                }
            } catch (err) { console.log("API降级使用本地文案"); }
        }
    }
    
    // 保存作品到localStorage，并给予鼓励语音
    function saveStudentWork(name) {
        if (!name.trim()) { alert("请输入姓名!"); return false; }
        const existing = studentWorks.find(w => w.name === name);
        const newCounts = { ...animalCounts };
        if (existing) {
            existing.counts = newCounts;
            existing.likes = existing.likes || 0;
        } else {
            studentWorks.push({ id: nextId++, name: name.trim(), counts: newCounts, likes: 0 });
        }
        persistWorks();
        renderWorksAndRank();
        // AI英文鼓励语音（本地规则）
        const praises = ["Good job!", "Well done!", "Fantastic farm!", "Excellent work!", "You're a great farmer!"];
        const praise = praises[Math.floor(Math.random() * praises.length)];
        speakText(praise, 0.9, 1.15);
        document.getElementById("aiSpeech").innerHTML = `🤖: ${praise} Your farm has been saved!`;
        return true;
    }
    
    function persistWorks() {
        localStorage.setItem("dreamSchoolFarm", JSON.stringify({ works: studentWorks, nextId }));
    }
    
    function loadWorksFromStorage() {
        const stored = localStorage.getItem("dreamSchoolFarm");
        if (stored) {
            try {
                const data = JSON.parse(stored);
                studentWorks = data.works || [];
                nextId = data.nextId || 200;
            } catch(e) {}
        }
        if (!studentWorks.length) {
            // 示例作品（包含牛鸡羊马完整计数）
            studentWorks = [
                { id: nextId++, name: "Emma", counts: { cow: 2, chicken: 1, sheep: 1, horse: 0 }, likes: 5 },
                { id: nextId++, name: "Liam", counts: { cow: 1, chicken: 3, sheep: 0, horse: 2 }, likes: 3 },
                { id: nextId++, name: "Sophia", counts: { cow: 0, chicken: 2, sheep: 2, horse: 1 }, likes: 7 }
            ];
            persistWorks();
        }
        renderWorksAndRank();
    }
    
    function likeWork(workId) {
        const work = studentWorks.find(w => w.id === workId);
        if (work) { work.likes += 1; persistWorks(); renderWorksAndRank(); }
    }
    
    function renderWorksAndRank() {
        const sorted = [...studentWorks].sort((a,b) => b.likes - a.likes);
        const top3 = sorted.slice(0,3);
        const rankDiv = document.getElementById("rankBoard");
        rankDiv.innerHTML = top3.map((w, idx) => `<div class="work-item"><span class="rank-badge">${idx+1}️⃣</span> ${w.name} 👍 ${w.likes} 赞</div>`).join("");
        const listContainer = document.getElementById("worksListContainer");
        listContainer.innerHTML = studentWorks.map(work => `
            <div class="work-item">
                <strong>${work.name}</strong>  🐄${work.counts.cow} 🐓${work.counts.chicken} 🐑${work.counts.sheep} 🐎${work.counts.horse}
                <div><button class="btn" style="padding:6px 14px; font-size:0.9rem;" data-like="${work.id}">👍 ${work.likes}</button>
                <button class="btn" style="padding:6px 14px; background:#3080c0;" data-load="${work.id}">📂 加载</button></div>
            </div>
        `).join("");
        document.querySelectorAll("[data-like]").forEach(btn => {
            btn.addEventListener("click", (e) => { const id = parseInt(btn.dataset.like); likeWork(id); });
        });
        document.querySelectorAll("[data-load]").forEach(btn => {
            btn.addEventListener("click", (e) => { const id = parseInt(btn.dataset.load); const w = studentWorks.find(wk=>wk.id===id); if(w) loadWork(w); });
        });
    }
    
    // 抽选同学 + AI智能介绍（语音+文字）
    async function randomPickStudent() {
        if (studentWorks.length === 0) { alert("暂无保存的作品"); return; }
        const randomIndex = Math.floor(Math.random() * studentWorks.length);
        const picked = studentWorks[randomIndex];
        loadWork(picked);   // 使用修复后的 loadWork 加载农场
        // 让AI介绍该学生的农场（语音+文字）
        const introText = generateFarmIntroText(); // 基于当前加载的动物数量
        const fullIntro = `This is ${picked.name}'s farm. ${introText}`;
        speakText(fullIntro, 0.85, 1.1);
        document.getElementById("aiSpeech").innerHTML = `🤖: ${fullIntro}`;
        lastGeneratedSentence = fullIntro;
    }
    
    // =============== 拖拽初始化 (支持触屏/鼠标，全功能克隆) ===============
    function initDragAndDrop() {
        const dragItems = document.querySelectorAll(".drag-item");
        let cloneDiv = null;
        let dragDataType = null;
        let isDraggingGlobal = false;
        
        dragItems.forEach(item => {
            item.addEventListener("touchstart", startDrag, {passive: false});
            item.addEventListener("mousedown", startDrag);
        });
        
        function startDrag(e) {
            e.preventDefault();
            const animal = e.currentTarget.getAttribute("data-animal");
            dragDataType = animal;
            const startPoint = e.touches ? e.touches[0] : e;
            cloneDiv = document.createElement("div");
            cloneDiv.style.position = "fixed";
            cloneDiv.style.zIndex = "9999";
            cloneDiv.style.pointerEvents = "none";
            cloneDiv.style.width = "100px";
            cloneDiv.style.height = "100px";
            cloneDiv.style.fontSize = "85px";
            cloneDiv.style.textAlign = "center";
            cloneDiv.style.display = "flex";
            cloneDiv.style.alignItems = "center";
            cloneDiv.style.justifyContent = "center";
            cloneDiv.innerHTML = ANIMALS[animal].emoji;
            cloneDiv.style.filter = "drop-shadow(0 8px 8px rgba(0,0,0,0.3))";
            document.body.appendChild(cloneDiv);
            cloneDiv.style.left = (startPoint.clientX - 50) + "px";
            cloneDiv.style.top = (startPoint.clientY - 50) + "px";
            isDraggingGlobal = true;
            
            const onMove = (moveEv) => {
                if (!isDraggingGlobal || !cloneDiv) return;
                moveEv.preventDefault();
                const point = moveEv.touches ? moveEv.touches[0] : moveEv;
                cloneDiv.style.left = (point.clientX - 50) + "px";
                cloneDiv.style.top = (point.clientY - 50) + "px";
            };
            const onEnd = (endEv) => {
                if (!isDraggingGlobal) return;
                const endPoint = endEv.changedTouches ? endEv.changedTouches[0] : endEv;
                const pasture = document.getElementById("pastureArea");
                const elemUnderPointer = document.elementsFromPoint(endPoint.clientX, endPoint.clientY);
                const isOverPasture = elemUnderPointer.includes(pasture);
                if (isOverPasture && dragDataType) {
                    addAnimalByType(dragDataType, endPoint.clientX, endPoint.clientY);
                }
                if (cloneDiv) cloneDiv.remove();
                isDraggingGlobal = false;
                dragDataType = null;
                window.removeEventListener("mousemove", onMove);
                window.removeEventListener("touchmove", onMove);
                window.removeEventListener("mouseup", onEnd);
                window.removeEventListener("touchend", onEnd);
            };
            window.addEventListener("mousemove", onMove);
            window.addEventListener("touchmove", onMove, {passive: false});
            window.addEventListener("mouseup", onEnd);
            window.addEventListener("touchend", onEnd);
        }
    }
    
    // 初始化入口
    function init() {
        loadWorksFromStorage();
        initDragAndDrop();
        resetFarm();        // 起始空农场
        document.getElementById("saveFarmBtn").addEventListener("click", () => {
            const name = document.getElementById("studentNameInput").value;
            saveStudentWork(name);
        });
        document.getElementById("clearBtn").addEventListener("click", () => { resetFarm(); });
        document.getElementById("introFarmBtn").addEventListener("click", () => { introduceFarm(); });
        document.getElementById("repeatBtn").addEventListener("click", () => { 
            if(lastGeneratedSentence) speakText(lastGeneratedSentence, 0.85, 1.1);
            else speakText("还没有句子，请先拖拽动物或点介绍农场", 0.85, 1.1);
        });
        document.getElementById("randomPickBtn").addEventListener("click", () => { randomPickStudent(); });
    }
    
    init();
</script>
